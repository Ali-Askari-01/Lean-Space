name: leanspace

description: Personal discipline and lightweight team check-ins.

publish_to: 'none'

version: 0.1.0+1



environment:

  sdk: ^3.12.2



dependencies:

  flutter:

    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_dotenv: ^6.0.1

  flutter_riverpod: ^3.3.2

  flutter_secure_storage: ^10.3.1

  go_router: ^17.3.0

  supabase_flutter: ^2.9.0

  flutter_timezone: ^5.1.0

  intl: ^0.20.2

  google_fonts: ^8.1.0

  share_plus: ^13.1.0

  path_provider: ^2.1.5

  home_widget: ^0.9.3

  in_app_purchase: ^3.2.1

  shared_preferences: ^2.5.3

  flutter_local_notifications: ^22.0.1

  timezone: ^0.11.0



dev_dependencies:

  flutter_test:

    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.3



flutter_launcher_icons:

  android: true

  ios: false

  image_path: assets/app_icon.png

  adaptive_icon_background: "#0F0D0B"

  adaptive_icon_foreground: assets/app_icon.png



flutter:

  uses-material-design: true

  assets:

    - .env

    - assets/app_icon.png

